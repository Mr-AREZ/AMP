<!DOCTYPE html>
<html lang="en" data-theme="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="AREZ Music Player (AMP) - a modern, minimal, responsive music player built with vanilla HTML, CSS, and JavaScript."
    />
    <meta name="theme-color" content="#0f1115" />
    <title>AREZ Music Player</title>
    <link rel="icon" href="assets/covers/cover-1.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body>
    <div class="app">
      <!-- Header -->
      <header class="app-header">
        <div class="brand">
          <div class="brand-mark" aria-hidden="true">
            <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M9 18V5l12-2v13" />
              <circle cx="6" cy="18" r="3" />
              <circle cx="18" cy="16" r="3" />
            </svg>
          </div>
          <div class="brand-text">
            <span class="brand-name">AREZ Music</span>
            <span class="brand-sub">Player</span>
          </div>
        </div>

        <button id="theme-toggle" class="theme-toggle" type="button" aria-label="Toggle color theme">
          <svg class="icon-sun" viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="4" />
            <path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M6.34 17.66l-1.41 1.41M19.07 4.93l-1.41 1.41" />
          </svg>
          <svg class="icon-moon" viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z" />
          </svg>
        </button>
      </header>

      <main class="layout">
        <!-- Now Playing Card -->
        <section class="player-card" aria-label="Now playing">
          <div class="cover-wrap">
            <img id="cover" class="cover" src="assets/covers/cover-1.png" alt="Album cover" />
            <div class="cover-glow" aria-hidden="true"></div>
          </div>

          <div class="track-meta">
            <h1 id="title" class="track-title">Loading…</h1>
            <p id="artist" class="track-artist">—</p>
          </div>

          <!-- Progress -->
          <div class="progress-block">
            <input
              id="seek"
              class="seek"
              type="range"
              min="0"
              max="100"
              value="0"
              step="0.1"
              aria-label="Seek"
            />
            <div class="time-row">
              <span id="current-time" class="time">0:00</span>
              <span id="duration" class="time">0:00</span>
            </div>
          </div>

          <!-- Controls -->
          <div class="controls">
            <button id="shuffle" class="ctrl ctrl-sm" type="button" aria-label="Shuffle" aria-pressed="false">
              <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M16 3h5v5" /><path d="M4 20 21 3" /><path d="M21 16v5h-5" /><path d="m15 15 6 6" /><path d="M4 4l5 5" />
              </svg>
            </button>

            <button id="prev" class="ctrl" type="button" aria-label="Previous track">
              <svg viewBox="0 0 24 24" width="24" height="24" fill="currentColor">
                <path d="M6 5a1 1 0 0 1 2 0v5.2l8.4-5.6A1 1 0 0 1 18 5.4v13.2a1 1 0 0 1-1.6.8L8 13.8V19a1 1 0 1 1-2 0z" />
              </svg>
            </button>

            <button id="play" class="ctrl ctrl-play" type="button" aria-label="Play">
              <svg class="icon-play" viewBox="0 0 24 24" width="28" height="28" fill="currentColor">
                <path d="M8 5.14v13.72a1 1 0 0 0 1.54.84l10.29-6.86a1 1 0 0 0 0-1.68L9.54 4.3A1 1 0 0 0 8 5.14z" />
              </svg>
              <svg class="icon-pause" viewBox="0 0 24 24" width="28" height="28" fill="currentColor">
                <path d="M7 4h3v16H7zM14 4h3v16h-3z" />
              </svg>
            </button>

            <button id="next" class="ctrl" type="button" aria-label="Next track">
              <svg viewBox="0 0 24 24" width="24" height="24" fill="currentColor">
                <path d="M18 5a1 1 0 0 0-2 0v5.2L7.6 4.6A1 1 0 0 0 6 5.4v13.2a1 1 0 0 0 1.6.8L16 13.8V19a1 1 0 1 0 2 0z" />
              </svg>
            </button>

            <button id="repeat" class="ctrl ctrl-sm" type="button" aria-label="Repeat" aria-pressed="false">
              <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M17 2l4 4-4 4" /><path d="M3 11v-1a4 4 0 0 1 4-4h14" /><path d="M7 22l-4-4 4-4" /><path d="M21 13v1a4 4 0 0 1-4 4H3" />
              </svg>
            </button>
          </div>

          <!-- Volume -->
          <div class="volume-block">
            <button id="mute" class="ctrl ctrl-sm" type="button" aria-label="Mute">
              <svg class="icon-volume" viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M11 5 6 9H2v6h4l5 4z" /><path d="M19.07 4.93a10 10 0 0 1 0 14.14M15.54 8.46a5 5 0 0 1 0 7.07" />
              </svg>
              <svg class="icon-muted" viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M11 5 6 9H2v6h4l5 4z" /><path d="m23 9-6 6M17 9l6 6" />
              </svg>
            </button>
            <input
              id="volume"
              class="volume"
              type="range"
              min="0"
              max="100"
              value="80"
              aria-label="Volume"
            />
          </div>
        </section>

        <!-- Playlist -->
        <section class="playlist-card" aria-label="Playlist">
          <div class="playlist-head">
            <h2 class="playlist-title">Playlist</h2>
            <span id="track-count" class="playlist-count">0 tracks</span>
          </div>
          <ul id="playlist" class="playlist" role="listbox" aria-label="Track list"></ul>
        </section>
      </main>

      <footer class="app-footer">
        <p>
          Built with vanilla HTML, CSS &amp; JavaScript ·
          <span class="footer-accent">AREZ Music Player</span>
        </p>
      </footer>
    </div>

    <audio id="audio" preload="metadata"></audio>

    <script src="js/tracks.js"></script>
    <script src="js/theme.js"></script>
    <script src="js/player.js"></script>
  </body>
</html>
